<!DOCTYPE HTML>
<html>
<head>
    <title>Cadastro - myDiary</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="stylesheet" href="static/assets/css/main.css" />
</head>

<body class="is-preload">

    <!-- Content -->
    <div id="content">
        <div class="inner">

            <article class="box post">

                <header>
                    <h2>Create an account</h2>
                    <p>Start saving your thoughs today.</p>
                </header>

                <form method="POST" action="/register">

                    <div class="row gtr-50">

                        <div class="col-12">
                            <label for="username"><strong>Username</strong></label>
                            <input
                                type="text"
                                name="username"
                                id="username"
                                placeholder="Username"
                                required
                            />
                        </div>

                        <div class="col-12">
                            <label for="email"><strong>E-mail</strong></label>
                            <input
                                type="email"
                                name="email"
                                id="email"
                                placeholder="youraddress@email.com"
                                required
                            />
                        </div>

                        <div class="col-12">
                            <label for="password"><strong>Password</strong></label>
                            <input
                                type="password"
                                name="password"
                                id="password"
                                placeholder="Password"
                                required
                            />
                        </div>

                        <div class="col-12">
                            <ul class="actions">
                                <li>
                                    <input
                                        type="submit"
                                        value="Create Account"
                                        class="button large"
                                    />
                                </li>
                            </ul>
                        </div>

                    </div>

                </form>

                <hr />

                <p style="text-align:center;">
                    Do you already have an account?
                    <a href="/login"><strong>Log In</strong></a>
                </p>

            </article>

        </div>
    </div>

    <!-- Sidebar -->
    <div id="sidebar">

        <!-- Logo -->
        <h1 id="logo">
            <a href="/">myDiary</a>
        </h1>

        <!-- Navigation -->
        <nav id="nav">
            <ul>
                <li class="current"><a href="{{ url_for('register') }}">Create Account</a></li>
                <li><a href="{{ url_for('login') }}">Log In</a></li>
            </ul>
        </nav>

        <!-- Text -->
        <section class="box text-style1">
            <div class="inner">
                <p>
                    <strong>myDiary</strong><br>
                    A comfortable place to save memories, thoughs and ideas.
                </p>
            </div>
        </section>

        <!-- Copyright -->
        <ul id="copyright">
            <li>&copy; myDiary</li>
            <li>2026</li>
        </ul>

    </div>

    <!-- Scripts -->
    <script src="static/assets/js/jquery.min.js"></script>
    <script src="static/assets/js/browser.min.js"></script>
    <script src="static/assets/js/breakpoints.min.js"></script>
    <script src="static/assets/js/util.js"></script>
    <script src="static/assets/js/main.js"></script>

</body>
</html>
